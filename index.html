<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow AI - Advanced Project Management</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-main: #fcfcfd;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
        }

        body {
            background-color: var(--bg-main);
            color: #1e293b;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(180deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 25s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .column-width {
            min-width: 340px;
            width: 340px;
        }

        .add-column-wrapper {
            min-width: 300px;
            padding-top: 10px;
        }

        .card-item {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
        }

        .card-item:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.05);
        }

        .sortable-ghost {
            opacity: 0.2;
            background: #6366f1 !important;
            border: 2px dashed #6366f1 !important;
            border-radius: 1.5rem;
        }

        .ai-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        .timeline-container { position: relative; padding-left: 24px; }
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: #f1f5f9;
        }

        .timeline-item { position: relative; padding-bottom: 24px; }
        .timeline-dot {
            position: absolute;
            left: -28px;
            top: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #cbd5e1;
            border: 2px solid white;
            box-shadow: 0 0 0 4px #f8fafc;
        }

        .timeline-dot.active {
            background: #6366f1;
            box-shadow: 0 0 0 4px #eef2ff;
        }
    </style>
</head>

<body class="h-screen flex flex-col relative">

    <div class="blob" style="top: -10%; left: -10%;"></div>
    <div class="blob" style="bottom: -10%; right: -10%; animation-delay: -5s;"></div>

    <div id="auth-screen" class="fixed inset-0 bg-white/40 backdrop-blur-xl z-[100] flex items-center justify-center p-4 transition-all duration-700">
        <div class="bg-white/80 p-10 md:p-14 rounded-[3rem] shadow-2xl w-full max-w-md text-center border border-white relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 ai-gradient"></div>
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-50 rounded-3xl mb-8 text-4xl shadow-inner">🎯</div>
            <h1 class="text-4xl font-[800] text-slate-900 mb-3 tracking-tight">TaskFlow <span class="text-transparent bg-clip-text ai-gradient">AI</span></h1>
            <p class="text-slate-500 mb-10 font-medium">İş akışınızı detaylı takip edin.</p>

            <div class="space-y-4">
                <input type="text" id="username-input" placeholder="Adınız Soyadınız"
                    class="w-full px-6 py-5 border-2 border-slate-100 rounded-2xl focus:border-indigo-500/30 focus:ring-4 focus:ring-indigo-500/5 outline-none text-lg transition-all bg-white/50 font-medium text-center">
                <button type="button" id="btn-login-action" class="w-full ai-gradient text-white font-bold py-5 rounded-2xl hover:opacity-90 transition-all active:scale-95 shadow-xl shadow-indigo-200 text-lg tracking-wide uppercase">Başlat</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex-col h-full opacity-0 transition-opacity duration-700">
        <header class="glass px-10 py-5 flex justify-between items-center shrink-0 z-50 sticky top-0 border-b border-slate-200/50">
            <div class="flex items-center gap-4">
                <div class="ai-gradient p-2.5 rounded-2xl text-white shadow-lg shadow-indigo-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 tracking-tighter leading-none mb-1">TASKFLOW <span class="text-indigo-600">AI</span></h1>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Gelişmiş Takip</span>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <button id="btn-reports" class="px-6 py-3 ai-gradient text-white rounded-2xl font-bold text-sm transition-all hover:scale-105 active:scale-95 shadow-lg shadow-indigo-200">✨ AKILLI ANALİZ</button>
                <div class="h-8 w-px bg-slate-200"></div>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p id="user-name-display" class="font-bold text-slate-800 text-sm leading-none mb-1">Misafir</p>
                        <span class="text-[10px] text-indigo-500 font-bold uppercase tracking-wider">Aktif</span>
                    </div>
                    <div id="user-avatar" class="w-11 h-11 rounded-2xl bg-indigo-50 border-2 border-indigo-100 text-indigo-600 flex items-center justify-center font-black">U</div>
                </div>
                <button id="btn-logout" class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-400 hover:text-red-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd" /></svg>
                </button>
            </div>
        </header>

        <main id="board-container" class="flex-1 overflow-x-auto p-10 flex items-start gap-8 select-none"></main>
    </div>

    <div id="modal-card" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[200] hidden items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-[3rem] shadow-2xl w-full max-w-2xl overflow-hidden transform transition-all scale-95 my-8" id="modal-content">
            <div class="px-10 py-8 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Görev Detayları</h2>
                <button onclick="closeModal()" class="text-slate-300 hover:text-slate-600 transition text-4xl leading-none">&times;</button>
            </div>
            <div class="p-10 space-y-6">
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Görev Adı</label>
                        <button id="btn-ai-magic" class="text-[10px] ai-gradient text-white px-4 py-1.5 rounded-full font-bold">✨ AI İLE DOLDUR</button>
                    </div>
                    <input type="text" id="task-title-input" class="w-full px-6 py-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500/30 bg-slate-50/50 text-lg font-bold">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Etiket</label>
                        <input type="text" id="task-tag-input" placeholder="Örn: Tasarım" class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500/30 bg-slate-50/50 text-sm font-bold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Sorumlu</label>
                        <input type="text" id="task-assignee-input" placeholder="Kişi adı" class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500/30 bg-slate-50/50 text-sm font-bold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Son Tarih</label>
                        <input type="date" id="task-deadline-input" class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500/30 bg-slate-50/50 text-sm font-bold">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Açıklama</label>
                    <textarea id="task-desc-input" rows="3" class="w-full px-6 py-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500/30 bg-slate-50/50 text-slate-600 font-medium"></textarea>
                </div>

                <div class="flex flex-col gap-4">
                    <div id="task-timestamps" class="flex justify-between items-center text-[11px] text-slate-400 border-t border-slate-100 pt-6"></div>
                    <div class="flex justify-between items-center pt-2">
                        <div class="flex gap-2">
                            <button id="btn-task-delete" class="text-red-400 font-bold text-sm px-4 py-2 hover:bg-red-50 rounded-xl transition">Sil</button>
                            <button id="btn-show-history" class="text-indigo-500 font-bold text-sm px-4 py-2 hover:bg-indigo-50 rounded-xl transition flex items-center gap-2">🕒 Geçmiş</button>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="closeModal()" class="px-6 py-3 font-bold text-slate-400">Vazgeç</button>
                            <button id="btn-task-save" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold shadow-xl">Kaydet</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-history" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[300] hidden items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md max-h-[80vh] flex flex-col overflow-hidden transform transition-all scale-95" id="history-content">
            <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-indigo-50/20">
                <h3 class="text-xl font-extrabold text-slate-900 flex items-center gap-2"><span>🕒</span> Etkinlik Günlüğü</h3>
                <button onclick="closeHistoryModal()" class="text-slate-300 hover:text-slate-600 transition text-3xl leading-none">&times;</button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-8 space-y-1 timeline-container"></div>
            <div class="p-6 bg-slate-50 text-center">
                <button onclick="closeHistoryModal()" class="text-sm font-bold text-slate-500 hover:text-slate-800">Kapat</button>
            </div>
        </div>
    </div>

    <div id="modal-analysis" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[200] hidden items-center justify-center p-4">
        <div class="bg-white rounded-[3rem] shadow-2xl w-full max-w-2xl overflow-hidden transform transition-all scale-95" id="analysis-content">
            <div class="px-10 py-8 border-b border-slate-100 flex justify-between items-center bg-indigo-50/30">
                <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">AI Analiz Raporu</h2>
                <button onclick="closeAnalysisModal()" class="text-slate-300 hover:text-slate-600 transition text-4xl leading-none">&times;</button>
            </div>
            <div class="p-10">
                <div id="analysis-loading" class="flex flex-col items-center py-10">
                    <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="font-bold text-slate-800 mt-4 italic">Verileriniz işleniyor...</p>
                </div>
                <div id="analysis-text" class="hidden text-slate-600 leading-relaxed max-h-[300px] overflow-y-auto italic whitespace-pre-line"></div>
                <div class="mt-8 flex justify-end">
                    <button onclick="closeAnalysisModal()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold">Kapat</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // API anahtarınızı buraya ekleyin.

        let appData = {
            user: null,
            columnOrder: ['col-todo', 'col-doing', 'col-done'],
            columns: {
                'col-todo': { id: 'col-todo', title: 'YAPILACAKLAR', cardIds: [] },
                'col-doing': { id: 'col-doing', title: 'DEVAM EDİYOR', cardIds: [] },
                'col-done': { id: 'col-done', title: 'TAMAMLANDI', cardIds: [] }
            },
            cards: {}
        };

        let currentTarget = { cardId: null, colId: null };

        const saved = localStorage.getItem('taskflow_v2_history');
        if (saved) appData = JSON.parse(saved);

        function persist() {
            localStorage.setItem('taskflow_v2_history', JSON.stringify(appData));
        }

        function formatFullDate(iso) {
            if (!iso) return '-';
            const d = new Date(iso);
            return d.toLocaleString('tr-TR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
        }

        function getTimeAgo(iso) {
            if (!iso) return '';
            const seconds = Math.floor((new Date() - new Date(iso)) / 1000);
            if (seconds < 60) return 'az önce';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes} dk önce`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours} saat önce`;
            return formatFullDate(iso);
        }

        // --- AUTH ---
        document.getElementById('btn-login-action').onclick = () => {
            const val = document.getElementById('username-input').value.trim();
            if (val.length < 2) return;
            appData.user = val;
            persist();
            startApp();
        };

        function startApp() {
            if (!appData.user) return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.replace('hidden', 'flex');
            setTimeout(() => document.getElementById('main-app').classList.replace('opacity-0', 'opacity-100'), 50);
            document.getElementById('user-name-display').innerText = appData.user;
            document.getElementById('user-avatar').innerText = appData.user.charAt(0).toUpperCase();
            renderBoard();
        }

        function addNewColumn() {
            const colName = prompt("Yeni sütun adını giriniz:");
            if (!colName || colName.trim() === "") return;
            const colId = 'col-' + Date.now();
            appData.columns[colId] = { id: colId, title: colName.toUpperCase(), cardIds: [] };
            appData.columnOrder.push(colId);
            persist();
            renderBoard();
        }

        // --- YENİ: SÜTUN BAŞLIĞI GÜNCELLEME ---
        function updateColumnTitle(colId) {
            const col = appData.columns[colId];
            const newTitle = prompt("Sütun başlığını düzenle:", col.title);
            if (newTitle !== null && newTitle.trim() !== "") {
                appData.columns[colId].title = newTitle.toUpperCase();
                persist();
                renderBoard();
            }
        }

        // --- RENDER BOARD ---
        function renderBoard() {
            const container = document.getElementById('board-container');
            container.innerHTML = '';

            appData.columnOrder.forEach(colId => {
                const col = appData.columns[colId];
                if (!col) return;
                const colEl = document.createElement('div');
                colEl.className = 'column-width glass rounded-[2.5rem] flex flex-col h-full border border-white/60 shadow-sm overflow-hidden shrink-0';
                colEl.dataset.id = colId;
                
                colEl.innerHTML = `
                    <div class="p-8 flex justify-between items-center drag-handle cursor-move">
                        <div class="flex items-center gap-3">
                            <div class="w-1.5 h-6 rounded-full ai-gradient"></div>
                            <h2 onclick="updateColumnTitle('${colId}')" class="font-extrabold text-slate-800 text-[11px] tracking-widest uppercase cursor-pointer hover:text-indigo-600 transition-all" title="Düzenlemek için tıkla">${col.title}</h2>
                        </div>
                        <span class="bg-white/80 px-3 py-1 rounded-xl text-[10px] font-black text-slate-500">${col.cardIds.length}</span>
                    </div>
                    <div class="card-drop-zone flex-1 px-5 pb-5 space-y-4 overflow-y-auto" data-col-id="${colId}"></div>
                    <div class="px-5 pb-8">
                        <button onclick="openModal(null, '${colId}')" class="w-full py-4 bg-white/60 text-indigo-600 font-extrabold rounded-2xl text-[10px] uppercase tracking-widest border border-white hover:bg-white transition-all">+ GÖREV EKLE</button>
                    </div>
                `;

                const dropZone = colEl.querySelector('.card-drop-zone');
                col.cardIds.forEach(cardId => {
                    const card = appData.cards[cardId];
                    if (card) {
                        const cardEl = document.createElement('div');
                        cardEl.className = 'card-item bg-white p-6 rounded-3xl border border-slate-100 cursor-pointer shadow-sm relative overflow-hidden';
                        cardEl.dataset.id = cardId;
                        
                        let deadlineHtml = card.deadline ? `<span class="text-[9px] font-bold text-orange-500">📅 ${card.deadline}</span>` : '';
                        let tagHtml = card.tag ? `<span class="px-2 py-0.5 bg-indigo-50 text-indigo-500 rounded-md text-[9px] font-black uppercase tracking-tighter">${card.tag}</span>` : '';
                        let assigneeHtml = card.assignee ? `<div class="w-6 h-6 rounded-lg bg-slate-100 flex items-center justify-center text-[9px] font-bold text-slate-500 border border-slate-200" title="${card.assignee}">${card.assignee.charAt(0).toUpperCase()}</div>` : '';

                        cardEl.innerHTML = `
                            <div class="flex flex-col gap-3">
                                <div class="flex justify-between items-start gap-2">
                                    ${tagHtml}
                                    ${deadlineHtml}
                                </div>
                                <div>
                                    <h3 class="font-extrabold text-slate-800 text-sm leading-tight">${card.title}</h3>
                                    <p class="text-[11px] text-slate-400 line-clamp-2 font-medium mt-1">${card.desc || ''}</p>
                                </div>
                                <div class="pt-3 border-t border-slate-50 flex justify-between items-center">
                                    <span class="text-[9px] font-bold text-slate-300 uppercase">🕒 ${getTimeAgo(card.updatedAt)}</span>
                                    ${assigneeHtml}
                                </div>
                            </div>
                        `;
                        cardEl.onclick = () => openModal(card, colId);
                        dropZone.appendChild(cardEl);
                    }
                });
                container.appendChild(colEl);
            });

            const addColWrapper = document.createElement('div');
            addColWrapper.className = 'add-column-wrapper shrink-0';
            addColWrapper.innerHTML = `
                <button onclick="addNewColumn()" class="w-full h-24 border-2 border-dashed border-slate-300 rounded-[2.5rem] flex items-center justify-center gap-2 text-slate-400 hover:text-indigo-500 hover:border-indigo-300 transition-all font-bold group">
                    <span class="text-2xl group-hover:scale-125 transition-transform">+</span>
                    <span>YENİ SÜTUN EKLE</span>
                </button>
            `;
            container.appendChild(addColWrapper);
            initInteractions();
        }

        function initInteractions() {
            new Sortable(document.getElementById('board-container'), {
                animation: 250, handle: '.drag-handle', draggable: '.column-width',
                onEnd: () => {
                    appData.columnOrder = Array.from(document.getElementById('board-container').querySelectorAll('.column-width')).map(el => el.dataset.id);
                    persist();
                }
            });

            document.querySelectorAll('.card-drop-zone').forEach(zone => {
                new Sortable(zone, {
                    group: 'tasks', animation: 250, ghostClass: 'sortable-ghost',
                    onEnd: (evt) => {
                        const cardId = evt.item.dataset.id;
                        const fromColId = evt.from.dataset.colId;
                        const toColId = evt.to.dataset.colId;

                        if (fromColId !== toColId) {
                            const fromTitle = appData.columns[fromColId].title;
                            const toTitle = appData.columns[toColId].title;
                            const timestamp = new Date().toISOString();
                            appData.cards[cardId].history.push({ type: 'move', msg: `${fromTitle} → ${toTitle}`, time: timestamp });
                            appData.cards[cardId].updatedAt = timestamp;
                        }

                        document.querySelectorAll('.card-drop-zone').forEach(z => {
                            appData.columns[z.dataset.colId].cardIds = Array.from(z.children).map(c => c.dataset.id);
                        });
                        persist();
                        renderBoard();
                    }
                });
            });
        }

        // --- MODAL ACTIONS ---
        window.openModal = (card, colId) => {
            currentTarget = { cardId: card?.id || null, colId };
            document.getElementById('task-title-input').value = card?.title || '';
            document.getElementById('task-desc-input').value = card?.desc || '';
            document.getElementById('task-tag-input').value = card?.tag || '';
            document.getElementById('task-assignee-input').value = card?.assignee || '';
            document.getElementById('task-deadline-input').value = card?.deadline || '';
            
            document.getElementById('btn-task-delete').style.display = card ? 'block' : 'none';
            document.getElementById('btn-show-history').style.display = card ? 'flex' : 'none';
            
            const ts = document.getElementById('task-timestamps');
            if (card) {
                ts.innerHTML = `<span>Oluşturulma: <b>${formatFullDate(card.createdAt)}</b></span><span>Güncelleme: <b>${formatFullDate(card.updatedAt)}</b></span>`;
            } else { ts.innerHTML = ''; }

            document.getElementById('modal-card').classList.replace('hidden', 'flex');
        };

        window.closeModal = () => document.getElementById('modal-card').classList.replace('flex', 'hidden');

        document.getElementById('btn-task-save').onclick = () => {
            const title = document.getElementById('task-title-input').value.trim();
            if (!title) return;
            const now = new Date().toISOString();

            const cardPayload = {
                title,
                desc: document.getElementById('task-desc-input').value,
                tag: document.getElementById('task-tag-input').value.trim(),
                assignee: document.getElementById('task-assignee-input').value.trim(),
                deadline: document.getElementById('task-deadline-input').value,
                updatedAt: now
            };

            if (currentTarget.cardId) {
                const card = appData.cards[currentTarget.cardId];
                Object.assign(card, cardPayload);
                card.history.push({ type: 'edit', msg: 'Görev güncellendi', time: now });
            } else {
                const id = 'card-' + Date.now();
                appData.cards[id] = {
                    id, ...cardPayload,
                    createdAt: now,
                    history: [{ type: 'create', msg: 'Görev oluşturuldu', time: now }]
                };
                appData.columns[currentTarget.colId].cardIds.push(id);
            }
            persist(); renderBoard(); closeModal();
        };

        // --- AI FEATURES ---
        async function fetchGemini(prompt, sys = "") {
            if(!apiKey) { alert("Lütfen kodun başındaki apiKey alanını doldurun."); return null; }
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{parts: [{text: prompt}]}],
                        systemInstruction: {parts: [{text: sys}]}
                    })
                });
                const data = await res.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch(e) { return null; }
        }

        document.getElementById('btn-ai-magic').onclick = async () => {
            const title = document.getElementById('task-title-input').value.trim();
            if (!title) return;
            
            document.getElementById('btn-ai-magic').innerText = "⏳...";
            
            const prompt = `Görev: "${title}". Bu görev için profesyonel bir açıklama ve bu görevi tanımlayan en fazla 2 kelimelik kısa bir etiket üret. Yanıtı JSON formatında ver: {"desc": "...", "tag": "..."}`;
            const sys = "Sadece istenen JSON formatında yanıt ver, başka açıklama yapma. Türkçe kullan.";
            
            const res = await fetchGemini(prompt, sys);
            if (res) {
                try {
                    const cleanRes = res.replace(/```json|```/g, "").trim();
                    const parsed = JSON.parse(cleanRes);
                    document.getElementById('task-desc-input').value = parsed.desc;
                    document.getElementById('task-tag-input').value = parsed.tag;
                } catch(e) { console.error("AI parse error", e); }
            }
            document.getElementById('btn-ai-magic').innerText = "✨ AI İLE DOLDUR";
        };

        document.getElementById('btn-reports').onclick = async () => {
            document.getElementById('analysis-text').classList.add('hidden');
            document.getElementById('analysis-loading').classList.remove('hidden');
            document.getElementById('modal-analysis').classList.replace('hidden', 'flex');
            
            let summary = "Mevcut Durum: ";
            appData.columnOrder.forEach(id => {
                const col = appData.columns[id];
                summary += `${col.title} sütununda ${col.cardIds.length} görev var. `;
            });

            const report = await fetchGemini(`Şu tablo verilerini analiz et ve kısa, motive edici bir yönetici özeti yaz: ${summary}`, "Sen bir CEO'sun. Türkçe konuş. Yanıtın profesyonel ve kısa olsun.");
            
            document.getElementById('analysis-loading').classList.add('hidden');
            if (report) {
                document.getElementById('analysis-text').innerText = report;
                document.getElementById('analysis-text').classList.remove('hidden');
            }
        };

        // --- OTHER UTILS ---
        window.closeAnalysisModal = () => document.getElementById('modal-analysis').classList.replace('flex', 'hidden');
        window.closeHistoryModal = () => document.getElementById('modal-history').classList.replace('flex', 'hidden');
        
        document.getElementById('btn-show-history').onclick = () => {
            const card = appData.cards[currentTarget.cardId];
            if (!card) return;
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            [...card.history].reverse().forEach((log, index) => {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                let icon = log.type === 'move' ? '🚀' : (log.type === 'create' ? '✨' : '📝');
                item.innerHTML = `
                    <div class="timeline-dot ${index === 0 ? 'active' : ''}"></div>
                    <div class="flex items-start gap-3">
                        <span class="text-base">${icon}</span>
                        <div>
                            <p class="text-xs font-black text-slate-400 uppercase tracking-tighter">${formatFullDate(log.time)}</p>
                            <p class="text-sm font-bold text-slate-700 leading-tight mt-0.5">${log.msg}</p>
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
            document.getElementById('modal-history').classList.replace('hidden', 'flex');
        };

        document.getElementById('btn-task-delete').onclick = () => {
            if(!confirm("Bu görevi silmek istediğinize emin misiniz?")) return;
            const { cardId, colId } = currentTarget;
            appData.columns[colId].cardIds = appData.columns[colId].cardIds.filter(x => x !== cardId);
            delete appData.cards[cardId];
            persist(); renderBoard(); closeModal();
        };

        document.getElementById('btn-logout').onclick = () => { if(confirm("Çıkış yapmak istiyor musunuz?")) { localStorage.clear(); location.reload(); } };

        if (appData.user) startApp();
    </script>
</body>

</html>
