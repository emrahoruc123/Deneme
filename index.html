<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow AI - Pro Edition</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        :root { --bg-main: #fcfcfd; --primary: #6366f1; }
        body { background-color: var(--bg-main); color: #1e293b; overflow: hidden; font-family: 'Inter', sans-serif; }
        .blob { position: absolute; width: 500px; height: 500px; background: linear-gradient(180deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%); filter: blur(80px); border-radius: 50%; z-index: -1; animation: move 25s infinite alternate; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .column-width { min-width: 340px; width: 340px; }
        .card-item { transition: all 0.2s ease; }
        .card-item:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.05); }
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .tag-pill { background: #eef2ff; color: #4338ca; font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .timeline-container { position: relative; padding-left: 24px; }
        .timeline-container::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px; background: #f1f5f9; }
        .timeline-item { position: relative; padding-bottom: 24px; }
        .timeline-dot { position: absolute; left: -28px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1; border: 2px solid white; box-shadow: 0 0 0 4px #f8fafc; }
        .timeline-dot.active { background: #6366f1; box-shadow: 0 0 0 4px #eef2ff; }
    </style>
</head>

<body class="h-screen flex flex-col relative">

    <div class="blob" style="top: -10%; left: -10%;"></div>
    <div class="blob" style="bottom: -10%; right: -10%; animation-delay: -5s;"></div>

    <div id="auth-screen" class="fixed inset-0 bg-white/40 backdrop-blur-xl z-[100] flex items-center justify-center p-4">
        <div class="bg-white/80 p-14 rounded-[3rem] shadow-2xl w-full max-w-md text-center border border-white">
            <h1 class="text-4xl font-black mb-8 italic text-slate-900">TASKFLOW <span class="text-indigo-600">AI</span></h1>
            <input type="text" id="username-input" placeholder="Adınız" class="w-full px-6 py-5 border-2 rounded-2xl mb-4 outline-none focus:border-indigo-500 text-center font-bold">
            <button id="btn-login-action" class="w-full ai-gradient text-white font-bold py-5 rounded-2xl shadow-xl uppercase transition-all active:scale-95">Sistemi Aç</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex-col h-full opacity-0 transition-opacity duration-700">
        <header class="glass px-10 py-5 flex justify-between items-center z-50 border-b">
            <div class="flex items-center gap-3">
                <div class="ai-gradient p-2 rounded-xl text-white font-black italic">T</div>
                <h1 class="text-xl font-black tracking-tighter">TASKFLOW PRO</h1>
            </div>
            <div class="flex items-center gap-6">
                <button id="btn-reports" class="px-5 py-2.5 ai-gradient text-white rounded-xl font-bold text-xs uppercase tracking-wider">Akıllı Analiz</button>
                <div class="flex items-center gap-3">
                    <div class="text-right"><p id="user-name-display" class="font-bold text-sm leading-none"></p></div>
                    <button id="btn-logout" class="text-slate-300 hover:text-red-500 transition"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg></button>
                </div>
            </div>
        </header>

        <main id="board-container" class="flex-1 overflow-x-auto p-10 flex items-start gap-8"></main>
    </div>

    <div id="modal-card" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[200] hidden items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-2xl overflow-hidden">
            <div class="px-10 py-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-black">Görev Detayları</h2>
                <button onclick="closeModal()" class="text-slate-300 text-3xl">&times;</button>
            </div>
            <div class="p-10 grid grid-cols-2 gap-6">
                <div class="col-span-2">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Başlık</label>
                        <button id="btn-ai-magic" class="text-[9px] ai-gradient text-white px-3 py-1 rounded-full font-bold">✨ AI İLE DOLDUR</button>
                    </div>
                    <input type="text" id="task-title-input" class="w-full px-5 py-3 border rounded-xl outline-none focus:border-indigo-500 font-bold">
                </div>
                
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Sorumlu</label>
                    <input type="text" id="task-assignee-input" placeholder="İsim Soyisim" class="w-full px-5 py-3 border rounded-xl outline-none focus:border-indigo-500 text-sm">
                </div>
                
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Son Tarih</label>
                    <input type="date" id="task-deadline-input" class="w-full px-5 py-3 border rounded-xl outline-none focus:border-indigo-500 text-sm">
                </div>

                <div class="col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Etiket</label>
                    <input type="text" id="task-tag-input" placeholder="Örn: Yazılım" class="w-full px-5 py-3 border rounded-xl outline-none focus:border-indigo-500 text-sm font-bold text-indigo-600">
                </div>

                <div class="col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Detaylar</label>
                    <textarea id="task-desc-input" rows="3" class="w-full px-5 py-3 border rounded-xl outline-none focus:border-indigo-500 text-sm"></textarea>
                </div>

                <div class="col-span-2 flex justify-between items-center pt-4 border-t">
                    <div class="flex gap-2">
                        <button id="btn-task-delete" class="text-red-500 font-bold text-sm px-3">Sil</button>
                        <button id="btn-show-history" class="text-indigo-500 font-bold text-sm px-3 border-l">Geçmiş</button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="closeModal()" class="px-6 py-2 font-bold text-slate-400 text-sm">Vazgeç</button>
                        <button id="btn-task-save" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-bold">Kaydet</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-history" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[300] hidden items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md max-h-[80vh] flex flex-col overflow-hidden">
            <div class="px-8 py-6 border-b flex justify-between items-center bg-indigo-50/30">
                <h3 class="text-lg font-black italic">ETKİNLİK GÜNLÜĞÜ</h3>
                <button onclick="closeHistoryModal()" class="text-slate-300 text-3xl">&times;</button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-8 timeline-container"></div>
        </div>
    </div>

    <script>
        const apiKey = ""; // Gemini API Key

        let appData = {
            user: null,
            columnOrder: ['col-todo', 'col-doing', 'col-done'],
            columns: {
                'col-todo': { id: 'col-todo', title: 'YAPILACAKLAR', cardIds: [] },
                'col-doing': { id: 'col-doing', title: 'DEVAM EDİYOR', cardIds: [] },
                'col-done': { id: 'col-done', title: 'TAMAMLANDI', cardIds: [] }
            },
            cards: {}
        };

        let currentTarget = { cardId: null, colId: null };

        const load = () => {
            const saved = localStorage.getItem('taskflow_pro_v3');
            if (saved) appData = JSON.parse(saved);
        };
        const persist = () => localStorage.setItem('taskflow_pro_v3', JSON.stringify(appData));

        document.getElementById('btn-login-action').onclick = () => {
            const val = document.getElementById('username-input').value.trim();
            if (val) { appData.user = val; persist(); startApp(); }
        };

        function startApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.replace('hidden', 'flex');
            document.getElementById('user-name-display').innerText = appData.user;
            setTimeout(() => document.getElementById('main-app').style.opacity = '1', 50);
            renderBoard();
        }

        function renderBoard() {
            const container = document.getElementById('board-container');
            container.innerHTML = '';
            appData.columnOrder.forEach(colId => {
                const col = appData.columns[colId];
                const colEl = document.createElement('div');
                colEl.className = 'column-width glass rounded-[2.5rem] flex flex-col h-full shrink-0 overflow-hidden';
                colEl.innerHTML = `
                    <div class="p-7 flex justify-between items-center font-black text-[10px] tracking-widest text-slate-400">
                        <span>${col.title}</span>
                        <span class="bg-white px-2 py-1 rounded-lg text-indigo-500 shadow-sm">${col.cardIds.length}</span>
                    </div>
                    <div class="card-drop-zone flex-1 px-4 pb-4 space-y-4 overflow-y-auto" data-col-id="${colId}"></div>
                    <div class="p-4"><button onclick="openModal(null, '${colId}')" class="w-full py-4 bg-white/50 rounded-2xl text-[10px] font-black text-indigo-500 hover:bg-white transition-all">+ YENİ GÖREV</button></div>
                `;
                
                const dropZone = colEl.querySelector('.card-drop-zone');
                col.cardIds.forEach(id => {
                    const card = appData.cards[id];
                    if(!card) return;
                    const cardEl = document.createElement('div');
                    cardEl.className = 'card-item bg-white p-6 rounded-[1.8rem] border border-slate-100 cursor-pointer shadow-sm';
                    cardEl.dataset.id = id;
                    cardEl.innerHTML = `
                        <div class="flex flex-col gap-2">
                            ${card.tag ? `<div><span class="tag-pill">${card.tag}</span></div>` : ''}
                            <h3 class="font-bold text-slate-800 text-sm leading-snug">${card.title}</h3>
                            <div class="flex flex-wrap gap-3 mt-3 pt-3 border-t border-slate-50">
                                ${card.assignee ? `<span class="text-[10px] text-slate-500 font-medium flex items-center gap-1">👤 ${card.assignee}</span>` : ''}
                                ${card.deadline ? `<span class="text-[10px] font-bold ${new Date(card.deadline) < new Date() ? 'text-red-500' : 'text-slate-400'} flex items-center gap-1">📅 ${card.deadline}</span>` : ''}
                            </div>
                        </div>
                    `;
                    cardEl.onclick = () => openModal(card, colId);
                    dropZone.appendChild(cardEl);
                });
                container.appendChild(colEl);
            });
            initSortable();
        }

        function initSortable() {
            document.querySelectorAll('.card-drop-zone').forEach(zone => {
                new Sortable(zone, {
                    group: 'tasks', animation: 200,
                    onEnd: (evt) => {
                        const cardId = evt.item.dataset.id;
                        const fromCol = evt.from.dataset.colId;
                        const toCol = evt.to.dataset.colId;
                        
                        if(fromCol !== toCol) {
                            const now = new Date().toISOString();
                            appData.cards[cardId].history.push({
                                type: 'move',
                                msg: `${appData.columns[fromCol].title} → ${appData.columns[toCol].title}`,
                                time: now
                            });
                        }

                        document.querySelectorAll('.card-drop-zone').forEach(z => {
                            appData.columns[z.dataset.colId].cardIds = Array.from(z.children).map(c => c.dataset.id);
                        });
                        persist(); renderBoard();
                    }
                });
            });
        }

        window.openModal = (card, colId) => {
            currentTarget = { cardId: card?.id || null, colId };
            document.getElementById('task-title-input').value = card?.title || '';
            document.getElementById('task-desc-input').value = card?.desc || '';
            document.getElementById('task-assignee-input').value = card?.assignee || '';
            document.getElementById('task-deadline-input').value = card?.deadline || '';
            document.getElementById('task-tag-input').value = card?.tag || '';
            document.getElementById('btn-task-delete').style.display = card ? 'block' : 'none';
            document.getElementById('btn-show-history').style.display = card ? 'block' : 'none';
            document.getElementById('modal-card').classList.replace('hidden', 'flex');
        };

        window.closeModal = () => document.getElementById('modal-card').classList.replace('flex', 'hidden');

        document.getElementById('btn-task-save').onclick = () => {
            const title = document.getElementById('task-title-input').value.trim();
            if (!title) return;
            const now = new Date().toISOString();

            if (currentTarget.cardId) {
                const card = appData.cards[currentTarget.cardId];
                card.title = title;
                card.desc = document.getElementById('task-desc-input').value;
                card.assignee = document.getElementById('task-assignee-input').value;
                card.deadline = document.getElementById('task-deadline-input').value;
                card.tag = document.getElementById('task-tag-input').value;
                card.history.push({ type: 'edit', msg: 'Görev güncellendi', time: now });
            } else {
                const id = 'card-' + Date.now();
                appData.cards[id] = {
                    id, title, 
                    desc: document.getElementById('task-desc-input').value,
                    assignee: document.getElementById('task-assignee-input').value,
                    deadline: document.getElementById('task-deadline-input').value,
                    tag: document.getElementById('task-tag-input').value,
                    history: [{ type: 'create', msg: 'Görev oluşturuldu', time: now }]
                };
                appData.columns[currentTarget.colId].cardIds.push(id);
            }
            persist(); renderBoard(); closeModal();
        };

        document.getElementById('btn-show-history').onclick = () => {
            const card = appData.cards[currentTarget.cardId];
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            [...card.history].reverse().forEach((log, i) => {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                item.innerHTML = `
                    <div class="timeline-dot ${i === 0 ? 'active' : ''}"></div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">${new Date(log.time).toLocaleString('tr-TR')}</p>
                    <p class="text-sm font-bold text-slate-700">${log.msg}</p>
                `;
                list.appendChild(item);
            });
            document.getElementById('modal-history').classList.replace('hidden', 'flex');
        };

        window.closeHistoryModal = () => document.getElementById('modal-history').classList.replace('flex', 'hidden');

        document.getElementById('btn-ai-magic').onclick = async () => {
            const title = document.getElementById('task-title-input').value;
            if (!title || !apiKey) return;
            const prompt = `"${title}" görevi için: 1) Çok kısa bir açıklama yaz. 2) Bu görev için en uygun TEK KELİMELİK bir kategori/etiket belirle. Aralarında '|' işareti olsun.`;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const [desc, tag] = data.candidates[0].content.parts[0].text.split('|');
                document.getElementById('task-desc-input').value = desc.trim();
                document.getElementById('task-tag-input').value = tag.trim().replace('#', '');
            } catch (e) { alert("AI Hatası: API Key kontrol edin."); }
        };

        document.getElementById('btn-task-delete').onclick = () => {
            const { cardId, colId } = currentTarget;
            appData.columns[colId].cardIds = appData.columns[colId].cardIds.filter(id => id !== cardId);
            delete appData.cards[cardId];
            persist(); renderBoard(); closeModal();
        };

        document.getElementById('btn-logout').onclick = () => { localStorage.clear(); location.reload(); };

        load();
        if (appData.user) startApp();
    </script>
</body>
</html>
