<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Agile - Koç Sistem Agile Management</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-main: #fcfcfd;
            --koc-red: #e11d48;
            --koc-black: #0f172a;
        }

        body {
            background-color: var(--bg-main);
            color: #1e293b;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .koc-gradient {
            background: linear-gradient(135deg, var(--koc-red) 0%, var(--koc-black) 100%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(225, 29, 72, 0.1);
        }

        .column-width { min-width: 340px; width: 340px; transition: background-color 0.3s ease; }
        
        /* Kart Stilleri ve Sürükleme Efektleri */
        .card-item {
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            border-left: 4px solid transparent;
            cursor: grab;
        }

        .card-item:active { cursor: grabbing; }

        .card-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px -5px rgba(225, 29, 72, 0.15);
            border-left-color: var(--koc-red);
        }

        /* SortableJS Sürükleme Efektleri */
        .sortable-ghost {
            opacity: 0.4;
            background: #fff1f2 !important;
            border: 2px dashed var(--koc-red) !important;
            box-shadow: none !important;
            transform: scale(0.95);
        }

        .sortable-drag {
            opacity: 1 !important;
            transform: rotate(3deg) scale(1.05) !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
            background: white !important;
        }

        .card-drop-zone { min-height: 100px; transition: padding 0.2s; }
        .card-drop-zone.sorting-active { background: rgba(225, 29, 72, 0.02); border-radius: 1.5rem; }

        .timeline-container { position: relative; padding-left: 24px; }
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: #f1f5f9;
        }

        .timeline-dot {
            position: absolute;
            left: -28px;
            top: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #cbd5e1;
            border: 2px solid white;
        }

        .timeline-dot.active {
            background: var(--koc-red);
            box-shadow: 0 0 0 4px #fff1f2;
        }

        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 12px;
            transition: all 0.2s;
        }

        .add-column-placeholder {
            min-width: 300px;
            height: 100px;
            border: 2px dashed #e2e8f0;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            transition: all 0.3s;
        }

        .add-column-placeholder:hover {
            border-color: var(--koc-red);
            color: var(--koc-red);
            background: white;
            box-shadow: 0 10px 15px -3px rgba(225, 29, 72, 0.05);
        }
    </style>
</head>

<body class="h-screen flex flex-col relative">

    <div id="auth-screen" class="fixed inset-0 bg-white/40 backdrop-blur-xl z-[100] flex items-center justify-center p-4">
        <div class="bg-white/80 p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center border border-white">
            <h1 class="text-4xl font-black text-slate-900 mb-8 tracking-tight">K-<span class="text-rose-600">Agile</span></h1>
            <input type="text" id="username-input" placeholder="Adınız Soyadınız"
                class="w-full px-6 py-5 border-2 border-slate-100 rounded-2xl focus:border-rose-500 outline-none text-lg text-center mb-4">
            <button id="btn-login-action" class="w-full koc-gradient text-white font-bold py-5 rounded-2xl shadow-xl hover:opacity-90 active:scale-95 transition-all">Sisteme Giriş</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex-col h-full">
        <header class="glass px-10 py-5 flex justify-between items-center shrink-0 z-50 border-b border-rose-100">
            <div class="flex items-center gap-4">
                <div class="koc-gradient p-2.5 rounded-2xl text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 tracking-tighter leading-none mb-1">K-<span class="text-rose-600">AGILE</span></h1>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Koç Sistem Kurumsal</span>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p id="user-name-display" class="font-bold text-slate-800 text-sm">Misafir</p>
                    <span class="text-[10px] text-rose-600 font-bold uppercase tracking-wider">Aktif Oturum</span>
                </div>
                <button id="btn-logout" title="Çıkış Yap" class="text-slate-400 hover:text-rose-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg></button>
            </div>
        </header>

        <main id="board-container" class="flex-1 overflow-x-auto p-10 flex items-start gap-8 select-none"></main>
    </div>

    <div id="modal-card" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[200] hidden items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-[3rem] shadow-2xl w-full max-w-2xl overflow-hidden" id="modal-content">
            <div class="px-10 py-8 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Görev Detayları</h2>
                <button onclick="closeModal()" class="text-slate-300 hover:text-rose-600 transition text-4xl">&times;</button>
            </div>
            <div class="p-10 space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Görev Tanımı</label>
                    <input type="text" id="task-title-input" class="w-full px-6 py-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-rose-500 bg-slate-50/50 text-lg font-bold">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Kategori</label>
                        <input type="text" id="task-tag-input" class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl outline-none focus:border-rose-500 bg-slate-50/50 text-sm font-bold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Sorumlu Kişi</label>
                        <input type="text" id="task-assignee-input" class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl outline-none focus:border-rose-500 bg-slate-50/50 text-sm font-bold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Bitiş Tarihi</label>
                        <input type="date" id="task-deadline-input" class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl outline-none focus:border-rose-500 bg-slate-50/50 text-sm font-bold">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Açıklama</label>
                    <textarea id="task-desc-input" rows="3" class="w-full px-6 py-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-rose-500 bg-slate-50/50 text-slate-600 font-medium"></textarea>
                </div>
                <div class="pt-6 border-t border-slate-100">
                    <div id="task-timestamps" class="flex justify-between items-center text-[11px] text-slate-400 mb-6"></div>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        <button id="btn-task-delete" class="btn-action bg-rose-50 text-rose-600 hover:bg-rose-100">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            Sil
                        </button>
                        <button id="btn-show-history" class="btn-action bg-slate-100 text-slate-700 hover:bg-slate-200">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            Kayıtlar
                        </button>
                        <button onclick="closeModal()" class="btn-action bg-slate-50 text-slate-500 hover:bg-slate-100">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                            İptal
                        </button>
                        <button id="btn-task-save" class="btn-action koc-gradient text-white shadow-lg shadow-rose-200">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                            Güncelle
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-history" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[300] hidden items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md max-h-[80vh] flex flex-col overflow-hidden">
            <div class="px-8 py-6 border-b border-rose-50 flex justify-between items-center bg-rose-50/30">
                <h3 class="text-xl font-extrabold text-slate-900">🕒 Görev Geçmişi</h3>
                <button onclick="closeHistoryModal()" class="text-slate-300 hover:text-rose-600 text-3xl">&times;</button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-8 space-y-1 timeline-container"></div>
        </div>
    </div>

    <script>
        let appData = {
            user: null,
            columnOrder: ['col-todo', 'col-doing', 'col-done'],
            columns: {
                'col-todo': { id: 'col-todo', title: 'YAPILACAKLAR', cardIds: [] },
                'col-doing': { id: 'col-doing', title: 'İŞLEMDE', cardIds: [] },
                'col-done': { id: 'col-done', title: 'TAMAMLANDI', cardIds: [] }
            },
            cards: {}
        };

        let currentTarget = { cardId: null, colId: null };
        const saved = localStorage.getItem('kagile_v5_data');
        if (saved) appData = JSON.parse(saved);

        function persist() { localStorage.setItem('kagile_v5_data', JSON.stringify(appData)); }

        function formatDateTime(iso) {
            if (!iso) return '-';
            const d = new Date(iso);
            return `${d.toLocaleDateString('tr-TR')} ${d.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})}`;
        }

        document.getElementById('btn-login-action').onclick = () => {
            const val = document.getElementById('username-input').value.trim();
            if (val.length < 2) return;
            appData.user = val;
            persist();
            startApp();
        };

        function startApp() {
            if (!appData.user) return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.replace('hidden', 'flex');
            document.getElementById('user-name-display').innerText = appData.user;
            renderBoard();
        }

        function addNewColumn() {
            const colName = prompt("Yeni sütun ismini girin:");
            if (!colName || colName.trim() === "") return;
            const id = 'col-' + Date.now();
            appData.columns[id] = { id, title: colName.toUpperCase(), cardIds: [] };
            appData.columnOrder.push(id);
            persist(); renderBoard();
        }

        function renderBoard() {
            const container = document.getElementById('board-container');
            container.innerHTML = '';

            appData.columnOrder.forEach(colId => {
                const col = appData.columns[colId];
                const colEl = document.createElement('div');
                colEl.className = 'column-width glass rounded-[2.5rem] flex flex-col h-full border border-white/60 shadow-sm shrink-0';
                colEl.dataset.id = colId;
                
                colEl.innerHTML = `
                    <div class="p-8 flex justify-between items-center drag-handle cursor-move">
                        <div class="flex items-center gap-3">
                            <div class="w-1.5 h-6 rounded-full bg-rose-600"></div>
                            <h2 class="font-extrabold text-slate-800 text-[11px] tracking-widest uppercase">${col.title}</h2>
                        </div>
                        <span class="bg-rose-50 px-3 py-1 rounded-xl text-[10px] font-black text-rose-600">${col.cardIds.length}</span>
                    </div>
                    <div class="card-drop-zone flex-1 px-5 pb-5 space-y-4 overflow-y-auto" data-col-id="${colId}"></div>
                    <div class="px-5 pb-8">
                        <button onclick="openModal(null, '${colId}')" class="w-full py-4 koc-gradient text-white font-extrabold rounded-2xl text-[10px] uppercase tracking-widest shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                           + YENİ GÖREV EKLE
                        </button>
                    </div>
                `;

                const dropZone = colEl.querySelector('.card-drop-zone');
                col.cardIds.forEach(cardId => {
                    const card = appData.cards[cardId];
                    if (card) {
                        const cardEl = document.createElement('div');
                        cardEl.className = 'card-item bg-white p-6 rounded-3xl border border-slate-100 shadow-sm';
                        cardEl.dataset.id = cardId;
                        cardEl.innerHTML = `
                            <div class="flex flex-col gap-3">
                                <div class="flex justify-between items-center">
                                    <span class="px-2 py-1 bg-slate-900 text-white rounded-md text-[8px] font-black uppercase">${card.tag || 'GENEL'}</span>
                                    ${card.deadline ? `<span class="text-[9px] font-bold text-rose-600">📅 ${card.deadline.split('-').reverse().join('.')}</span>` : ''}
                                </div>
                                <h3 class="font-extrabold text-slate-800 text-sm leading-tight">${card.title}</h3>
                                <div class="pt-3 border-t border-slate-50 flex justify-between items-center">
                                    <span class="text-[9px] font-bold text-slate-400 uppercase">İŞLEM: ${formatDateTime(card.updatedAt).split(' ')[1]}</span>
                                    <div title="${card.assignee || 'Atanmamış'}" class="w-7 h-7 rounded-lg bg-rose-50 flex items-center justify-center text-[10px] font-bold text-rose-600 border border-rose-100">
                                        ${(card.assignee || '?').charAt(0).toUpperCase()}
                                    </div>
                                </div>
                            </div>
                        `;
                        cardEl.onclick = () => openModal(card, colId);
                        dropZone.appendChild(cardEl);
                    }
                });
                container.appendChild(colEl);
            });

            const addColBtn = document.createElement('div');
            addColBtn.className = 'shrink-0 pt-2';
            addColBtn.innerHTML = `<button onclick="addNewColumn()" class="add-column-placeholder font-bold text-xs flex flex-col gap-2"><span class="text-2xl">+</span><span>SÜTUN EKLE</span></button>`;
            container.appendChild(addColBtn);

            initSortable();
        }

        function initSortable() {
            document.querySelectorAll('.card-drop-zone').forEach(zone => {
                new Sortable(zone, {
                    group: 'tasks',
                    animation: 250,
                    ghostClass: 'sortable-ghost',
                    dragClass: 'sortable-drag',
                    onStart: () => {
                        document.querySelectorAll('.card-drop-zone').forEach(z => z.classList.add('sorting-active'));
                    },
                    onEnd: (evt) => {
                        document.querySelectorAll('.card-drop-zone').forEach(z => z.classList.remove('sorting-active'));
                        const cardId = evt.item.dataset.id;
                        const fromColId = evt.from.dataset.colId;
                        const toColId = evt.to.dataset.colId;
                        
                        if (fromColId !== toColId) {
                            const now = new Date().toISOString();
                            appData.cards[cardId].history.push({ 
                                type: 'move', 
                                msg: `${appData.columns[fromColId].title} → ${appData.columns[toColId].title}`, 
                                time: now 
                            });
                            appData.cards[cardId].updatedAt = now;
                        }
                        
                        document.querySelectorAll('.card-drop-zone').forEach(z => {
                            appData.columns[z.dataset.colId].cardIds = Array.from(z.children).map(c => c.dataset.id);
                        });
                        persist(); renderBoard();
                    }
                });
            });

            new Sortable(document.getElementById('board-container'), {
                animation: 250, draggable: '.column-width', handle: '.drag-handle',
                ghostClass: 'opacity-50',
                onEnd: () => {
                    appData.columnOrder = Array.from(document.getElementById('board-container').querySelectorAll('.column-width')).map(el => el.dataset.id);
                    persist();
                }
            });
        }

        window.openModal = (card, colId) => {
            currentTarget = { cardId: card?.id || null, colId };
            document.getElementById('task-title-input').value = card?.title || '';
            document.getElementById('task-desc-input').value = card?.desc || '';
            document.getElementById('task-tag-input').value = card?.tag || '';
            document.getElementById('task-assignee-input').value = card?.assignee || '';
            document.getElementById('task-deadline-input').value = card?.deadline || '';
            document.getElementById('btn-task-delete').style.display = card ? 'flex' : 'none';
            document.getElementById('btn-show-history').style.display = card ? 'flex' : 'none';
            const ts = document.getElementById('task-timestamps');
            if (card) {
                ts.innerHTML = `<span>Giriş: <b>${formatDateTime(card.createdAt)}</b></span><span>Revizyon: <b>${formatDateTime(card.updatedAt)}</b></span>`;
            } else { ts.innerHTML = ''; }
            document.getElementById('modal-card').classList.replace('hidden', 'flex');
        };

        window.closeModal = () => document.getElementById('modal-card').classList.replace('flex', 'hidden');

        document.getElementById('btn-task-save').onclick = () => {
            const title = document.getElementById('task-title-input').value.trim();
            if (!title) return;
            const now = new Date().toISOString();
            const payload = {
                title, desc: document.getElementById('task-desc-input').value,
                tag: document.getElementById('task-tag-input').value.trim().toUpperCase(),
                assignee: document.getElementById('task-assignee-input').value.trim(),
                deadline: document.getElementById('task-deadline-input').value,
                updatedAt: now
            };
            if (currentTarget.cardId) {
                Object.assign(appData.cards[currentTarget.cardId], payload);
                appData.cards[currentTarget.cardId].history.push({ type: 'edit', msg: 'Bilgiler Güncellendi', time: now });
            } else {
                const id = 'card-' + Date.now();
                appData.cards[id] = { id, ...payload, createdAt: now, history: [{ type: 'create', msg: 'Görev Başlatıldı', time: now }] };
                appData.columns[currentTarget.colId].cardIds.push(id);
            }
            persist(); renderBoard(); closeModal();
        };

        document.getElementById('btn-show-history').onclick = () => {
            const card = appData.cards[currentTarget.cardId];
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            [...card.history].reverse().forEach((log, idx) => {
                const item = document.createElement('div');
                item.className = 'relative pb-6 pl-2';
                item.innerHTML = `<div class="timeline-dot ${idx === 0 ? 'active' : ''}"></div><p class="text-[10px] font-bold text-slate-400">${formatDateTime(log.time)}</p><p class="text-sm font-bold text-slate-700">${log.msg}</p>`;
                list.appendChild(item);
            });
            document.getElementById('modal-history').classList.replace('hidden', 'flex');
        };

        window.closeHistoryModal = () => document.getElementById('modal-history').classList.replace('flex', 'hidden');

        document.getElementById('btn-task-delete').onclick = () => {
            if(!confirm("Silmek istediğinize emin misiniz?")) return;
            appData.columns[currentTarget.colId].cardIds = appData.columns[currentTarget.colId].cardIds.filter(id => id !== currentTarget.cardId);
            delete appData.cards[currentTarget.cardId];
            persist(); renderBoard(); closeModal();
        };

        document.getElementById('btn-logout').onclick = () => { if(confirm("Çıkış yapılsın mı?")) { localStorage.clear(); location.reload(); } };

        if (appData.user) startApp();
    </script>
</body>
</html>
